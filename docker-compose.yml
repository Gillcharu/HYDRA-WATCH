version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://hydra_user:hydra_pass@db:5432/hydrawatch_db
      - CORS_ALLOWED_ORIGINS=http://localhost:8080,http://127.0.0.1:8080
      - LOG_LEVEL=INFO
    depends_on:
      - db
    volumes:
      - ./data:/app/data

  db:
    image: postgres:15-alpine
    container_name: hydrawatch_postgres_db
    environment:
      - POSTGRES_USER=hydra_user
      - POSTGRES_PASSWORD=hydra_pass
      - POSTGRES_DB=hydrawatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
