name: HydraWatch verification

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: python3 -m pytest tests/ -v
      - name: Validate all regions
        run: python3 run.py validate-all
      - name: Case study gate
        run: python3 run.py case-study
      - name: Deploy gate smoke test
        run: python3 run.py gate --region eu-north-1 --min-score 50
